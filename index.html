<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sistema de Pedidos de Material</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="loading-overlay" class="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-txt">Conectando ao Firebase...</div>
</div>

<div class="app">
  <div class="header">
    <div class="header-left">
      <div class="logo"><i class="ti ti-package" aria-hidden="true"></i></div>
      <div>
        <div class="title">Pedidos de Material <span class="sync-pill"><i class="ti ti-cloud" aria-hidden="true"></i> Firebase</span></div>
        <div class="subtitle" id="header-sub">Provedor de Materiais</div>
      </div>
    </div>
    <div class="nav">
      <button class="nav-btn active" onclick="showSection('novo')" id="tab-novo"><i class="ti ti-plus" aria-hidden="true"></i> Novo pedido</button>
      <button class="nav-btn" onclick="showSection('meus-pedidos')" id="tab-meus-pedidos" style="display:none"><i class="ti ti-clipboard-list" aria-hidden="true"></i> Meus Pedidos <span id="tab-meus-pedidos-badge" style="display:none;background:#185FA5;color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;margin-left:2px;vertical-align:middle"></span></button>
      <button class="nav-btn" onclick="showSection('pedidos')" id="tab-pedidos"><i class="ti ti-list" aria-hidden="true"></i> Todos os pedidos</button>
      <button class="nav-btn" onclick="showSection('estoque')" id="tab-estoque"><i class="ti ti-layout-kanban" aria-hidden="true"></i> Estoque</button>
      <button class="nav-btn" onclick="showSection('catalogo')" id="tab-catalogo"><i class="ti ti-box" aria-hidden="true"></i> Catálogo</button>
      <button class="nav-btn" onclick="showSection('config')" id="tab-config"><i class="ti ti-settings" aria-hidden="true"></i> Configurações</button>
    </div>
    <button class="theme-quick-toggle" onclick="alternarTema()" id="theme-quick-toggle" title="Alternar tema claro/escuro">
      <i class="ti ti-moon" id="theme-quick-icon" aria-hidden="true"></i>
    </button>
  </div>

  <!-- NOVO PEDIDO -->
  <div class="section active" id="sec-novo">

    <!-- Tela de login do técnico -->
    <div id="tecnico-login-overlay" class="tecnico-login-overlay">
      <div class="tecnico-login-box">
        <div class="tecnico-login-header">
          <div class="tecnico-login-icon"><i class="ti ti-hard-hat"></i></div>
          <div class="tecnico-login-title">Identificação do Técnico</div>
          <div class="tecnico-login-sub">Selecione seu código para acessar o sistema</div>
        </div>
        <div class="tecnico-login-body">
          <label>Quem é você?</label>
          <div class="tec-searchselect" id="tec-searchselect">
            <div class="tec-searchselect-trigger" id="tec-trigger" onclick="toggleTecDropdown()">
              <span id="tec-trigger-label">— Selecione seu código —</span>
              <i class="ti ti-chevron-down" id="tec-chevron"></i>
            </div>
            <div class="tec-searchselect-dropdown" id="tec-dropdown">
              <div class="tec-search-wrap">
                <i class="ti ti-search tec-search-icon"></i>
                <input type="text" class="tec-search-input" id="tec-search-input"
                  placeholder="Buscar por nome ou código…"
                  oninput="filtrarTecnicos(this.value)"
                  onclick="event.stopPropagation()" />
              </div>
              <div class="tec-options-list" id="tec-options-list"></div>
            </div>
          </div>
          <select id="tecnico-select" style="display:none"></select>
          <button class="btn btn-primary btn-tecnico-entrar" onclick="confirmarTecnico()">
            <i class="ti ti-login"></i> Entrar como técnico
          </button>
          <div class="tecnico-login-divider">
            <span>ou</span>
          </div>
          <button class="btn btn-estoque-acesso" onclick="irParaEstoque()">
            <i class="ti ti-layout-kanban"></i> Sou do Estoque — ir direto
          </button>
        </div>
      </div>
    </div>

    <!-- Notificação: pedido pronto -->
    <div class="notify-bar" id="notify-bar">
      <div class="notify-bell"><i class="ti ti-bell-ringing"></i></div>
      <div class="notify-text">
        <strong>🎉 Seu(s) pedido(s) está(ão) pronto(s)!</strong>
        <span id="notify-msg">Dirija-se ao estoque para retirar.</span>
      </div>
      <div class="notify-count" id="notify-count">1</div>
    </div>

    <!-- Banner pedindo permissão de notificação (técnico) -->
    <div class="notif-permission-bar" id="notif-permission-bar-tec">
      <div class="notif-permission-icon"><i class="ti ti-bell"></i></div>
      <div class="notif-permission-text">
        <strong>Ativar notificações</strong>
        <span>Receba um aviso quando seu pedido estiver separado, mesmo com a tela fechada.</span>
      </div>
      <button class="notif-permission-btn" onclick="solicitarPermissaoNotif('tec')"><i class="ti ti-bell-ringing"></i> Ativar</button>
      <button class="notif-permission-dismiss" onclick="dispensarBannerNotif('tec')" title="Fechar"><i class="ti ti-x"></i></button>
    </div>

    <!-- Badge do técnico logado -->
    <div id="tecnico-logged-bar" style="display:none;align-items:center;gap:10px;background:var(--brand-light);border:0.5px solid var(--brand-mid);border-radius:var(--radius);padding:8px 14px;margin-bottom:1rem;">
      <i class="ti ti-hard-hat" style="color:var(--brand);font-size:18px"></i>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:600;color:var(--brand-dark)" id="tecnico-logged-nome"></div>
        <div style="font-size:11px;color:var(--text-muted)">Técnico identificado</div>
      </div>
      <button class="btn-logout" onclick="sairTecnico()" style="font-size:12px;padding:4px 10px"><i class="ti ti-logout"></i> Sair</button>
    </div>

    <div class="card" id="card-tecnico-nome" style="display:none">
      <div class="card-title"><i class="ti ti-user" aria-hidden="true"></i> Identificação do técnico</div>
      <div class="form-full">
        <label>Seu código</label>
        <input type="text" id="tecnico-nome" placeholder="" readonly style="background:var(--bg);cursor:default;font-weight:600;font-size:15px;color:var(--brand-dark)" />
      </div>
    </div>
    <div class="card">
      <div class="card-title"><i class="ti ti-box" aria-hidden="true"></i> Materiais do pedido</div>
      <label style="margin-bottom:8px;display:block">Clique para adicionar do catálogo</label>
      <input type="text" id="cat-search-novo" placeholder="🔍  Buscar material no catálogo..." oninput="renderCatalogChips()" style="margin-bottom:10px;font-size:14px" />
      <div class="mat-grid" id="mat-grid"></div>
      <div class="divider">ou adicione manualmente</div>
      <div class="inline-add" style="margin-top:4px">
        <input type="text" id="mat-manual" placeholder="Nome do material..." />
        <input type="number" id="mat-qty" class="qty-sm" placeholder="Qtd" min="1" value="1" />
        <button class="btn btn-primary" onclick="addItemManual()"><i class="ti ti-plus" aria-hidden="true"></i> Add</button>
      </div>
      <div style="margin-top:1rem">
        <div id="items-list" class="items-list"></div>
        <div id="items-empty" style="font-size:13px;color:var(--text-muted);padding:10px 0;display:none">Nenhum material adicionado ainda.</div>
      </div>
    </div>
    <div class="card">
      <div class="card-title"><i class="ti ti-notes" aria-hidden="true"></i> Observação</div>
      <textarea id="obs" placeholder="Justificativa, local de entrega, detalhes adicionais..."></textarea>
    </div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;padding:13px;font-size:15px" onclick="enviarPedido()">
      <i class="ti ti-send" aria-hidden="true"></i> Enviar pedido
    </button>
  </div>

  <!-- MEUS PEDIDOS -->
  <div class="section" id="sec-meus-pedidos">
    <div class="card" style="margin-bottom:1rem">
      <div class="meus-pedidos-header">
        <div class="meus-pedidos-title"><i class="ti ti-clipboard-list"></i> Meus Pedidos</div>
        <span id="meus-pedidos-tec-label" style="font-size:12px;color:var(--text-muted);background:var(--brand-light);padding:3px 10px;border-radius:99px;border:0.5px solid var(--brand-mid);color:var(--brand-dark);font-weight:500"></span>
      </div>
      <div id="meus-pedidos-notify" style="display:none" class="meu-pedido-pronto-banner">
        <i class="ti ti-bell-ringing" style="font-size:18px;flex-shrink:0"></i>
        <span id="meus-pedidos-notify-msg">Pedido(s) pronto(s) para retirada!</span>
      </div>
      <div id="meus-pedidos-list" class="meus-pedidos-list"></div>
    </div>
  </div>

  <!-- TODOS OS PEDIDOS -->
  <div class="section" id="sec-pedidos">
    <div id="pedidos-auth-wall" class="card auth-wall" style="display:flex">
      <div class="auth-wall-icon"><i class="ti ti-lock" aria-hidden="true"></i></div>
      <div class="auth-wall-title">Acesso restrito — Almoxarifado</div>
      <div class="auth-wall-sub">Essa área é exclusiva para funcionários do estoque.<br>Faça login com sua conta <strong>@viuinternet.com.br</strong> para continuar.</div>
      <button class="btn-google" onclick="loginGoogle()">

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    const swCode = `
self.addEventListener('install', e => self.skipWaiting());
self.addEventListener('activate', e => e.waitUntil(clients.claim()));
self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => caches.match(e.request))));
    `;
    const blob = new Blob([swCode], {type: 'application/javascript'});
    const swUrl = URL.createObjectURL(blob);
    navigator.serviceWorker.register(swUrl).then(reg => {
      console.log('SW registrado:', reg.scope);
    }).catch(err => console.log('SW erro:', err));
  });
}
</script>
